<!DOCTYPE html>
<html lang="en">

<head>
    <script src="./assets/js/clockwidget.js"></script>
    <script src="./assets/js/windowsystem/window.js"></script>
    <script src="./assets/js/windowsystem/window-manager.js"></script>
    <link rel="stylesheet" href="./assets/css/window.css">
    <link rel="stylesheet" href="./assets/css/desktop.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VAPOR</title>
</head>

<body>
    <div class="clockwidget">
        <div class="clock">
            <h1 id="time">loading...</h1>
        </div>
    </div>
    <div class="desktop"></div>
    <script>
        window.addEventListener('message', (event) => {
            if (!event.data || event.data.type !== 'vapor-launcher-open-game-window') return;
            const payload = event.data.payload || {};
            if (!payload.url || !windowManager || typeof windowManager.openWindow !== 'function') return;
            const gameUrl = new URL(payload.url, window.location.href).href;
            windowManager.openWindow(gameUrl, payload.title || 'Game', payload.width || 900, payload.height || 600, payload.icon || '');
        });

        document.addEventListener('DOMContentLoaded', () => {
            windowManager.init('.desktop');
            // Open Test Game with a placeholder icon (assets/images/test-icon.svg)
            windowManager.openWindow('vaporlauncher/index.html', 'VAPOR', 800, 600, '');
        });
    </script>
</body>

</html>
