<!DOCTYPE html>
<html lang="en">

<head>
    <script src="./assets/js/clockwidget.js"></script>
    <script src="./assets/js/windowsystem/window.js"></script>
    <script src="./assets/js/windowsystem/window-manager.js"></script>
    <link rel="stylesheet" href="./assets/css/window.css">
    <link rel="stylesheet" href="./assets/css/desktop.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VAPOR</title>
</head>

<body>
    <div class="clockwidget">
        <div class="clock">
            <h1 id="time">loading...</h1>
        </div>
    </div>
    <div class="desktop"></div>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            windowManager.init('.desktop');
            // Open Test Game with a placeholder icon (assets/images/test-icon.svg)
            windowManager.openWindow('games//test/test.html', 'Test Game', 800, 600, './games/test/icon.png');
            windowManager.openWindow('games//test2/test.html', 'Test Game2', 800, 600, './games/test2/icon.png');
            windowManager.openWindow('vaporlauncher/index.html', 'VAPOR', 800, 600, '');
        });
    </script>
</body>

</html>
