<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="./style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VAPORLauncher</title>
</head>
<body>
    <header class="top-bar">
        <div class="top-bar__left">
            <span class="top-bar__logo">VAPOR</span>
            <nav class="top-bar__nav">
                <a class="top-bar__nav-item active">LIBRARY</a>
            </nav>
        </div>
        <div class="top-bar__right">
            <input type="text" id="search-input" class="search-input" placeholder="Search games..." />
        </div>
    </header>
    <div class="app-container">
        <aside class="sidebar">
            <h2 class="sidebar__title">LIBRARY</h2>
            <div id="game-list" class="game-list"></div>
        </aside>
        <main class="main-content">
            <div id="game-details" class="game-details">
                <div class="placeholder">
                    <div class="placeholder__inner">
                        <span class="placeholder__logo">PV</span>
                        <h1 class="placeholder__title">Welcome to Project VAPOR</h1>
                        <p class="placeholder__desc">is the new ui tuff?<br>--sircheetodust</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Desktop container for window system -->
    <div id="desktop" class="desktop"></div>

    <!-- Window system scripts (global windowManager) -->
    <script src="./scripts/windowsystem/window.js"></script>
    <script src="./scripts/windowsystem/window-manager.js"></script>

    <script src="./scripts/storage.js"></script>
    <script src="./scripts/fetch.js"></script>
</body>
</html>
